<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>{{title}} | {{siteTitle}}</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet">
    <script>
        (function () {
            try {
                const storedTheme = localStorage.getItem('tetractys-site-theme');
                if (storedTheme === 'light' || storedTheme === 'dark') {
                    document.documentElement.setAttribute('data-theme', storedTheme);
                }
            } catch (error) {}
        }());
    </script>
    <style>
        :root {
            color-scheme: light;
            --bg: #fff;
            --text: #000;
            --muted: #666;
            --subtle: #999;
            --line: #e5e5e5;
            --surface: #fafafa;
            --button-bg: transparent;
            --button-border: #e5e5e5;
            --button-text: #000;
            --button-hover-bg: #000;
            --button-hover-text: #fff;
            --link: #666;
            --link-hover: #000;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                color-scheme: dark;
                --bg: #101214;
                --text: #f4efe8;
                --muted: #c1b8ab;
                --subtle: #938c84;
                --line: #2c3238;
                --surface: #181c20;
                --button-bg: rgba(255, 255, 255, 0.03);
                --button-border: #394149;
                --button-text: #f4efe8;
                --button-hover-bg: #f4efe8;
                --button-hover-text: #101214;
                --link: #d8d0c3;
                --link-hover: #fff;
            }
        }

        :root[data-theme="light"] {
            color-scheme: light;
            --bg: #fff;
            --text: #000;
            --muted: #666;
            --subtle: #999;
            --line: #e5e5e5;
            --surface: #fafafa;
            --button-bg: transparent;
            --button-border: #e5e5e5;
            --button-text: #000;
            --button-hover-bg: #000;
            --button-hover-text: #fff;
            --link: #666;
            --link-hover: #000;
        }

        :root[data-theme="dark"] {
            color-scheme: dark;
            --bg: #101214;
            --text: #f4efe8;
            --muted: #c1b8ab;
            --subtle: #938c84;
            --line: #2c3238;
            --surface: #181c20;
            --button-bg: rgba(255, 255, 255, 0.03);
            --button-border: #394149;
            --button-text: #f4efe8;
            --button-hover-bg: #f4efe8;
            --button-hover-text: #101214;
            --link: #d8d0c3;
            --link-hover: #fff;
        }

        @keyframes fade-shift {
            0% { color: #80cbc4; }
            50% { color: #c42b8c; }
            100% { color: #80cbc4; }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.5;
            color: var(--text);
            background: var(--bg);
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.35s ease, color 0.35s ease;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 3rem;
        }

        header {
            padding: 8rem 0 12rem;
            border-bottom: 1px solid var(--line);
        }

        .header-meta {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 2rem;
            margin-bottom: 6rem;
        }

        .logo {
            font-size: 1.125rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            font-size: 1.5rem;
            animation: fade-shift 15s infinite ease-in-out;
            transition: color 0.5s;
        }

        h1 {
            font-size: 5.5rem;
            font-weight: 300;
            line-height: 1.1;
            letter-spacing: -0.03em;
            max-width: 900px;
            margin-bottom: 3rem;
        }

        .intro {
            font-size: 1.5rem;
            font-weight: 300;
            line-height: 1.6;
            color: var(--muted);
            max-width: 700px;
        }

        section {
            padding: 8rem 0;
            border-bottom: 1px solid var(--line);
        }

        section:last-of-type {
            border-bottom: none;
        }

        .section-label {
            font-size: 0.875rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--subtle);
            margin-bottom: 4rem;
        }

        .contact-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
            position: relative;
        }

        .email {
            font-size: 1.75rem;
            font-weight: 300;
            color: var(--text);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .email:hover {
            color: var(--link);
        }

        .copy-btn {
            background: var(--button-bg);
            border: 1px solid var(--button-border);
            padding: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            border-radius: 4px;
            color: var(--button-text);
        }

        .copy-btn:hover {
            border-color: var(--button-hover-bg);
            background: var(--button-hover-bg);
            color: var(--button-hover-text);
        }

        .copy-btn:hover svg {
            stroke: currentColor;
        }

        .copy-btn svg {
            stroke: currentColor;
            transition: stroke 0.3s ease;
        }

        .copy-feedback {
            position: absolute;
            left: 0;
            top: -2rem;
            font-size: 0.875rem;
            color: var(--text);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .copy-feedback.show {
            opacity: 1;
        }

        .theme-toggle {
            appearance: none;
            border: 1px solid var(--button-border);
            background: var(--button-bg);
            color: var(--button-text);
            border-radius: 999px;
            padding: 0.65rem 0.95rem;
            font: inherit;
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        .theme-toggle-kicker {
            opacity: 0.65;
        }

        .theme-toggle:hover {
            border-color: var(--button-hover-bg);
            background: var(--button-hover-bg);
            color: var(--button-hover-text);
        }

        .theme-toggle:focus-visible,
        .copy-btn:focus-visible,
        .email:focus-visible {
            outline: 2px solid var(--text);
            outline-offset: 3px;
        }

        footer {
            padding: 4rem 0;
            font-size: 0.875rem;
            color: var(--subtle);
        }

        @media (max-width: 1024px) {
            .container {
                padding: 0 2rem;
            }

            h1 {
                font-size: 4rem;
            }
        }

        @media (max-width: 768px) {
            header {
                padding: 4rem 0 6rem;
            }

            .header-meta {
                flex-direction: column;
                gap: 1.5rem;
                margin-bottom: 3rem;
            }

            h1 {
                font-size: 2.5rem;
            }

            .intro {
                font-size: 1.25rem;
            }

            section {
                padding: 4rem 0;
            }

            .theme-toggle {
                align-self: flex-start;
            }
        }
    </style>
    <script>
        const THEME_STORAGE_KEY = 'tetractys-site-theme';

        function applyThemePreference(theme) {
            if (theme === 'light' || theme === 'dark') {
                document.documentElement.setAttribute('data-theme', theme);
                return;
            }
            document.documentElement.removeAttribute('data-theme');
        }

        function getActiveTheme() {
            const override = document.documentElement.getAttribute('data-theme');
            if (override === 'light' || override === 'dark') {
                return override;
            }
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function syncThemeToggle() {
            const themeToggle = document.getElementById('themeToggle');
            if (!themeToggle) {
                return;
            }

            const nextTheme = getActiveTheme() === 'dark' ? 'Light' : 'Dark';
            const label = themeToggle.querySelector('.theme-toggle-label');
            label.textContent = nextTheme;
            themeToggle.setAttribute('aria-label', `Switch to ${nextTheme.toLowerCase()} mode`);
            themeToggle.setAttribute('aria-pressed', String(getActiveTheme() === 'dark'));
        }

        function initializeThemeToggle() {
            const themeToggle = document.getElementById('themeToggle');
            if (!themeToggle) {
                return;
            }

            themeToggle.addEventListener('click', () => {
                const nextTheme = getActiveTheme() === 'dark' ? 'light' : 'dark';
                applyThemePreference(nextTheme);
                try {
                    localStorage.setItem(THEME_STORAGE_KEY, nextTheme);
                } catch (error) {}
                syncThemeToggle();
            });

            const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
            const handleSystemThemeChange = () => {
                if (!document.documentElement.hasAttribute('data-theme')) {
                    syncThemeToggle();
                }
            };

            if (typeof mediaQuery.addEventListener === 'function') {
                mediaQuery.addEventListener('change', handleSystemThemeChange);
            } else if (typeof mediaQuery.addListener === 'function') {
                mediaQuery.addListener(handleSystemThemeChange);
            }

            syncThemeToggle();
        }

        function copyEmail() {
            const email = '{{contactEmail}}';

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(email).then(() => {
                    showCopyFeedback();
                }).catch(err => {
                    console.error('Could not copy text: ', err);
                    fallbackCopyTextToClipboard(email);
                });
            } else {
                fallbackCopyTextToClipboard(email);
            }
        }

        function fallbackCopyTextToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.opacity = "0";

            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showCopyFeedback();
                }
            } catch (err) {
                console.error('Fallback: Oops, unable to copy', err);
            }
            document.body.removeChild(textArea);
        }

        function showCopyFeedback() {
            const feedback = document.getElementById('copyFeedback');
            feedback.classList.add('show');
            setTimeout(() => {
                feedback.classList.remove('show');
            }, 2000);
        }

        document.addEventListener('DOMContentLoaded', initializeThemeToggle);
    </script>
</head>

<body>
    <div class="container">
        <header>
            <div class="header-meta">
                <div class="logo">
                    <span class="material-symbols-outlined logo-icon">spa</span>
                    {{siteTitle}}
                </div>
                <button type="button" class="theme-toggle" id="themeToggle" aria-label="Switch theme">
                    <span class="theme-toggle-kicker">Theme</span>
                    <span class="theme-toggle-label">Dark</span>
                </button>
            </div>
            <h1>{{title}}</h1>
            <p class="intro">{{intro}}</p>
        </header>

        <section>
            <div class="section-label">Post / {{publishedAt}}</div>
            <div class="body">{{body}}</div>
        </section>

        <section>
            <div class="section-label">{{contactLabel}}</div>
            <div class="contact-container">
                <a href="mailto:{{contactEmail}}" class="email">{{contactEmail}}</a>
                <button class="copy-btn" onclick="copyEmail()" aria-label="Copy email address">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </button>
                <span class="copy-feedback" id="copyFeedback">Copied</span>
            </div>
        </section>

        <footer>
            {{footerText}}
        </footer>
    </div>
</body>

</html>
