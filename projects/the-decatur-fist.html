<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>The Decatur Fist | Dean Haddock</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet">
    <script>
        (function () {
            try {
                const storedTheme = localStorage.getItem('tetractys-site-theme');
                if (storedTheme === 'light' || storedTheme === 'dark') {
                    document.documentElement.setAttribute('data-theme', storedTheme);
                }
            } catch (error) {}
        }());
    </script>
    <style>
        :root {
            color-scheme: light;
            --bg: #fff;
            --text: #000;
            --muted: #666;
            --subtle: #999;
            --line: #e5e5e5;
            --button-bg: transparent;
            --button-border: #e5e5e5;
            --button-text: #000;
            --button-hover-bg: #000;
            --button-hover-text: #fff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                color-scheme: dark;
                --bg: #101214;
                --text: #f4efe8;
                --muted: #c1b8ab;
                --subtle: #938c84;
                --line: #2c3238;
                --button-bg: rgba(255, 255, 255, 0.03);
                --button-border: #394149;
                --button-text: #f4efe8;
                --button-hover-bg: #f4efe8;
                --button-hover-text: #101214;
            }
        }

        :root[data-theme="light"] {
            color-scheme: light;
            --bg: #fff;
            --text: #000;
            --muted: #666;
            --subtle: #999;
            --line: #e5e5e5;
            --button-bg: transparent;
            --button-border: #e5e5e5;
            --button-text: #000;
            --button-hover-bg: #000;
            --button-hover-text: #fff;
        }

        :root[data-theme="dark"] {
            color-scheme: dark;
            --bg: #101214;
            --text: #f4efe8;
            --muted: #c1b8ab;
            --subtle: #938c84;
            --line: #2c3238;
            --button-bg: rgba(255, 255, 255, 0.03);
            --button-border: #394149;
            --button-text: #f4efe8;
            --button-hover-bg: #f4efe8;
            --button-hover-text: #101214;
        }

        @keyframes fade-shift {
            0% { color: #80cbc4; }
            50% { color: #c42b8c; }
            100% { color: #80cbc4; }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.5;
            color: var(--text);
            background: var(--bg);
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.35s ease, color 0.35s ease;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 3rem;
        }

        header {
            padding: 8rem 0 12rem;
            border-bottom: 1px solid var(--line);
        }

        .header-meta {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 2rem;
            margin-bottom: 6rem;
        }

        .logo {
            font-size: 1.125rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            font-size: 1.5rem;
            animation: fade-shift 15s infinite ease-in-out;
            transition: color 0.5s;
        }

        h1 {
            font-size: 5.5rem;
            font-weight: 300;
            line-height: 1.1;
            letter-spacing: -0.03em;
            max-width: 900px;
            margin-bottom: 3rem;
        }

        .intro {
            font-size: 1.5rem;
            font-weight: 300;
            line-height: 1.6;
            color: var(--muted);
            max-width: 700px;
        }

        section {
            padding: 8rem 0;
            border-bottom: 1px solid var(--line);
        }

        section:last-of-type {
            border-bottom: none;
        }

        .section-label {
            font-size: 0.875rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--subtle);
            margin-bottom: 4rem;
        }

        .theme-toggle {
            appearance: none;
            border: 1px solid var(--button-border);
            background: var(--button-bg);
            color: var(--button-text);
            border-radius: 999px;
            padding: 0.65rem 0.95rem;
            font: inherit;
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        .theme-toggle-kicker {
            opacity: 0.65;
        }

        .theme-toggle:hover {
            border-color: var(--button-hover-bg);
            background: var(--button-hover-bg);
            color: var(--button-hover-text);
        }

        .theme-toggle:focus-visible {
            outline: 2px solid var(--text);
            outline-offset: 3px;
        }

        footer {
            padding: 4rem 0;
            font-size: 0.875rem;
            color: var(--subtle);
        }

        @media (max-width: 1024px) {
            .container {
                padding: 0 2rem;
            }

            h1 {
                font-size: 4rem;
            }
        }

        @media (max-width: 768px) {
            header {
                padding: 4rem 0 6rem;
            }

            .header-meta {
                flex-direction: column;
                gap: 1.5rem;
                margin-bottom: 3rem;
            }

            h1 {
                font-size: 2.5rem;
            }

            .intro {
                font-size: 1.25rem;
            }

            section {
                padding: 4rem 0;
            }

            .theme-toggle {
                align-self: flex-start;
            }
        }
    </style>
    <script>
        const THEME_STORAGE_KEY = 'tetractys-site-theme';

        function applyThemePreference(theme) {
            if (theme === 'light' || theme === 'dark') {
                document.documentElement.setAttribute('data-theme', theme);
                return;
            }
            document.documentElement.removeAttribute('data-theme');
        }

        function getActiveTheme() {
            const override = document.documentElement.getAttribute('data-theme');
            if (override === 'light' || override === 'dark') {
                return override;
            }
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function syncThemeToggle() {
            const themeToggle = document.getElementById('themeToggle');
            if (!themeToggle) {
                return;
            }

            const nextTheme = getActiveTheme() === 'dark' ? 'Light' : 'Dark';
            themeToggle.querySelector('.theme-toggle-label').textContent = nextTheme;
            themeToggle.setAttribute('aria-label', `Switch to ${nextTheme.toLowerCase()} mode`);
            themeToggle.setAttribute('aria-pressed', String(getActiveTheme() === 'dark'));
        }

        function initializeThemeToggle() {
            const themeToggle = document.getElementById('themeToggle');
            if (!themeToggle) {
                return;
            }

            themeToggle.addEventListener('click', () => {
                const nextTheme = getActiveTheme() === 'dark' ? 'light' : 'dark';
                applyThemePreference(nextTheme);
                try {
                    localStorage.setItem(THEME_STORAGE_KEY, nextTheme);
                } catch (error) {}
                syncThemeToggle();
            });

            const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
            const handleSystemThemeChange = () => {
                if (!document.documentElement.hasAttribute('data-theme')) {
                    syncThemeToggle();
                }
            };

            if (typeof mediaQuery.addEventListener === 'function') {
                mediaQuery.addEventListener('change', handleSystemThemeChange);
            } else if (typeof mediaQuery.addListener === 'function') {
                mediaQuery.addListener(handleSystemThemeChange);
            }

            syncThemeToggle();
        }

        document.addEventListener('DOMContentLoaded', initializeThemeToggle);
    </script>
</head>

<body>
    <div class="container">
        <header>
            <div class="header-meta">
                <div class="logo">
                    <span class="material-symbols-outlined logo-icon">spa</span>
                    Dean Haddock
                </div>
                <button type="button" class="theme-toggle" id="themeToggle" aria-label="Switch theme">
                    <span class="theme-toggle-kicker">Theme</span>
                    <span class="theme-toggle-label">Dark</span>
                </button>
            </div>
            <h1>The Decatur Fist</h1>
            <p class="intro">The Decatur Fist is my music project, which I started almost 20 years ago in a small town in Texas.</p>
        </header>

        <section>
            <div class="section-label">Post / 2026-03-30T22:09</div>
            <div class="body">Decatur Fist stuff here.</div>
        </section>

        <section>
            <div class="section-label">Music</div>
            <p class="intro">2026-03-30T22:09</p>
        </section>

        <footer>
            
        </footer>
    </div>
</body>

</html>
